<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CDI - Login</title>
    <link
      rel="shortcut icon"
      href="assets/img/cdi-favicon.png"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.3.0/font/bootstrap-icons.css"
    />
  </head>
  <body>
    <section class="container-fluid px-0 overflow-x-hidden">
      <div class="row">
        <div class="col-12 col-md-7 d-none d-md-block">
          <div class="img-container position-relative">
            <img src="assets/img/1.jpeg" alt="Login Image" />
          </div>
        </div>
        <div class="col-12 col-md-5 align-content-center">
          <div class="d-flex flex-column p-3">
            <h2>Welcome Back</h2>
            <span class="text-muted">Login to Continue</span>
            <form action="#" class="mt-4">
              <div class="mb-3">
                <label for="exampleInputEmail1" class="form-label"
                  >Username</label
                >
                <input
                  type="text"
                  class="input-field form-control bg-transparent border-gray shadow-none"
                  placeholder="Username"
                  aria-label="Username"
                  aria-describedby="basic-addon1"
                />
              </div>
              <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <div class="input-group input-field mb-3">
                  <input
                    id="password"
                    type="password"
                    class="form-control input-field border-gray shadow-none bg-transparent"
                    placeholder="Enter password"
                    aria-label="Enter password"
                    aria-describedby="basic-addon2"
                    required
                  />
                  <span
                    id="toggle-icon"
                    onclick="{togglePassword()}"
                    class="input-group-text border-gray bg-transparent c-pointer"
                    id="basic-addon2"
                    ><i class="bi bi-eye" id="toggle-password-icon"></i
                  ></span>
                </div>
              </div>
              <div class="d-flex justify-content-end">
                <a href="#" class="text-primary text-decoration-none"
                  >Forgot Password?</a
                >
              </div>
              <a
                href="dashboard.html"
                class="btn btn-primary text-decoration-none w-100 mt-3"
                >Login</a
              >
            </form>
          </div>
        </div>
      </div>
    </section>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO"
      crossorigin="anonymous"
    ></script>
    <script src="js/script.js"></script>
  </body>
</html>
