<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CDI - Dashboard</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.3.0/font/bootstrap-icons.css"
    />
  </head>
  <body>
    <!-- Header -->
    <header
      id="navbar"
      data-aos="fade-down"
      class="container-fluid z-5 top-0 px-0"
    >
      <nav
        class="navbar navbar-expand-lg bg-light justify-content-between px-4"
      >
        <a class="navbar-brand" href="#hero" title="home">
          <img src="assets/img/cdi-logo.png" alt="Brand Logo" />
        </a>
        <div class="d-flex justify-content-end list-unstyled align-items-center gap-2 ">
             <div class="input-group rounded-4 ">
              <input
                id="search"
                type="search"
                class="form-control border-gray shadow-none bg-transparent"
                placeholder="Search"
                aria-label="Search"
                aria-describedby="basic-addon2"
              />
              <span
                id="search-icon"
                class="input-group-text border-gray bg-transparent"
                id="basic-addon2"
                ><i class="bi bi-search"></i></i
              ></span>
            </div>
            <li class="nav-item">
              <a class="btn btn-primary" href="login.html">Logout</a>
            </li>
        </div>
        </div>
      </nav>
    </header>
    <!-- Header -->

    <!--Main Content -->
    <main class="container-fluid mt-10 px-4">
    <h2 class="text-start">
        Available Presentation <span class="wave-underline"></span>
      </h2>

      <div class="row g-3 mt-1 ">
        <div class="col-12 col-md-6 col-lg-3 c-pointer" onclick="window.location.href='pptview.html'" >
            <div class="card" >
                <img src="assets/img/btc-ppt.png" class="card-img-top" alt="...">
                <div class="card-body">
                    <h5 class="card-title ">Behind The Curtain</h5>
                    <p class="card-text">21 Slides <span>•</span> 49 Views</p>
                </div>
            </div>
        </div>
        <div class="col-12 col-md-6 col-lg-3">
            <div class="card" >
                <img src="assets/img/3.png" class="card-img-top" alt="...">
                <div class="card-body">
                    <h5 class="card-title ">Interior Design</h5>
                    <p class="card-text">39 Slides <span>•</span> 120 Views</p>
                </div>
            </div>
        </div>
        <div class="col-12 col-md-6 col-lg-3">
            <div class="card" >
                <img src="assets/img/4.png" class="card-img-top" alt="...">
                <div class="card-body">
                    <h5 class="card-title ">Design, Curtains and Blinds</h5>
                    <p class="card-text">28 Slides <span>•</span> 75 Views</p>
                </div>
            </div>
        </div>
        <div class="col-12 col-md-6 col-lg-3">
            <div class="card" >
                <img src="assets/img/1.jpeg" class="card-img-top" alt="...">
                <div class="card-body">
                    <h5 class="card-title ">Modern Curtains</h5>
                    <p class="card-text">45 Slides <span>•</span> 200 Views</p>
                </div>
            </div>
        </div>
      </div>

    </main>
    <!--Main Content -->

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO"
      crossorigin="anonymous"
    ></script>
    <script src="js/script.js"></script>
  </body>
</html>
